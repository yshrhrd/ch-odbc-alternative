name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download zlib source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path third_party/zlib_src -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz" -OutFile zlib.tar.gz
          tar -xzf zlib.tar.gz -C third_party/zlib_src
          Remove-Item zlib.tar.gz

      - name: Build Solution
        run: msbuild clickhouse_odbc.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=x64 /p:PlatformToolset=v143 /m

      - name: Run Tests
        run: .\build\${{ matrix.configuration }}\test\ch-odbc-alternative-test.exe

      - name: Upload Build Artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            build/Release/ch-odbc-alternative.dll
            build/Release/ch-odbc-alternative-installer.exe
            setup/register_driver.bat
            setup/unregister_driver.bat
            setup/create_dsn.bat
            setup/remove_dsn.bat
            setup/setup.inf
            setup/README_SETUP.txt
          retention-days: 7
