name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.1.0, 1.2.0-rc1)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}"
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=v$ver" >> $env:GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download zlib source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path third_party/zlib_src -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz" -OutFile zlib.tar.gz
          tar -xzf zlib.tar.gz -C third_party/zlib_src
          Remove-Item zlib.tar.gz

      # --- Build ---
      - name: Build Solution (Release)
        run: msbuild clickhouse_odbc.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /m

      # --- Test ---
      - name: Run Tests
        run: .\build\Release\test\ch-odbc-alternative-test.exe

      # --- Package ---
      - name: Create release package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $distDir = "dist\ch-odbc-alternative-${version}-x64"

          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          # DLL
          Copy-Item "build\Release\ch-odbc-alternative.dll" $distDir

          # Installer
          Copy-Item "build\Release\ch-odbc-alternative-installer.exe" $distDir

          # Setup batch files
          Copy-Item "setup\register_driver.bat"   $distDir
          Copy-Item "setup\unregister_driver.bat"  $distDir
          Copy-Item "setup\create_dsn.bat"         $distDir
          Copy-Item "setup\remove_dsn.bat"         $distDir
          Copy-Item "setup\setup.inf"              $distDir
          Copy-Item "setup\README_SETUP.txt"       $distDir

          # Create ZIP
          $zipName = "ch-odbc-alternative-${version}-x64.zip"
          Compress-Archive -Path "$distDir\*" -DestinationPath "dist\$zipName"
          echo "ZIP_PATH=dist\$zipName" >> $env:GITHUB_OUTPUT
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
        id: package

      # --- GitHub Release ---
      - name: Generate release notes from CHANGELOG
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content "CHANGELOG.md" -Raw -ErrorAction SilentlyContinue
          if (-not $content) {
              $body = "Release $version"
              echo "BODY=$body" >> $env:GITHUB_OUTPUT
              return
          }

          # Extract the section for this version (between ## [version] and next ## [)
          $escapedVer = [regex]::Escape($version)
          $pattern = "(?ms)^## \[$escapedVer\].*?(?=^## \[|\z)"
          $match = [regex]::Match($content, $pattern, 'Multiline')
          if ($match.Success) {
              $body = $match.Value.Trim()
          } else {
              $body = "Release $version"
          }

          # Write to file to avoid escaping issues
          $body | Out-File -FilePath "release_notes.md" -Encoding utf8

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.TAG }}
          git push origin ${{ steps.version.outputs.TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: CH ODBC Alternative ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ steps.package.outputs.ZIP_PATH }}
          fail_on_unmatched_files: false
